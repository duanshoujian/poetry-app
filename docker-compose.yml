version: '3.8'

services:
  # 诗泉 API - 诗词数据源
  poetry-api:
    image: palemoky/chinese-poetry-api:latest
    restart: unless-stopped
    ports:
      - "1279:1279"

  # NestJS 后端
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - POETRY_API_URL=http://poetry-api:1279
    depends_on:
      - poetry-api

  # React 前端 (Nginx)
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server
